machine:
  install:
    disk: /dev/sda
  nodeLabels:
    openebs.io/engine: mayastor
  sysctls:
    vm.nr_hugepages: 1024
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: eth0
selector:
    match: mac(link.permanent_addr) == "b8:85:84:bb:cb:6f"
---
apiVersion: v1alpha1
kind: LinkConfig
name: eth0
up: true
addresses:
  - address: 192.168.25.115/24
routes:
  - gateway: 192.168.25.1
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: talos-worker-5
