machine:
  install:
    disk: /dev/sda
  nodeLabels:
    openebs.io/engine: mayastor
  sysctls:
    vm.nr_hugepages: 1024
  network:
    hostname: talos-worker-4
    interfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - 192.168.25.114/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.25.1
