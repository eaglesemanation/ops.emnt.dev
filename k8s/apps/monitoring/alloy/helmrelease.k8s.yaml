# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 2h
  timeout: 30m
  targetNamespace: alloy
  chart:
    spec:
      chart: alloy
      version: 1.10.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    alloy:
      clustering:
        enabled: true
      configMap:
        create: false
        name: alloy-config
        key: config.alloy
      securityContext:
        privileged: true
        runAsUser: 0
      mounts:
        varlog: true
        extra:
          - name: proc
            mountPath: /proc
            readOnly: true
          - name: sys
            mountPath: /sys
            readOnly: true
    controller:
      tolerations:
        - key: emnt.dev/on-nas
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        extra:
          - name: proc
            hostPath:
              path: /proc
          - name: sys
            hostPath:
              path: /sys
