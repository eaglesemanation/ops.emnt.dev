# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.0.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Makes object names less insanely long
    cleanPrometheusOperatorObjectNames: true
    # Anything longer prevents CSI from provisioning volumes
    fullnameOverride: prom
    defaultRules:
      rules:
        # Not used with Cilium
        kubeProxy: false
    kubeControllerManager:
      service:
        selector:
          k8s-app: kube-controller-manager
    kubeScheduler:
      service:
        selector:
          k8s-app: kube-scheduler
    kubeEtcd:
      endpoints:
        - ${K8S_CONTROLLER_1_ADDR}
    grafana:
      enabled: false
      forceDeployDashboards: true
      operator:
        matchLabels:
          app.kubernetes.io/name: grafana
        dashboardsConfigMapRefEnabled: true
    prometheusOperator:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi
    kube-state-metrics:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi
    prometheus-node-exporter:
      tolerations:
        - key: emnt.dev/on-nas
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 64Mi
    prometheus:
      prometheusSpec:
        # Disable scraping handling, Alloy is taking care of that
        serviceMonitorSelector:
          matchLabels:
            prometheus-operator.emnt.dev/prevent-scraping: "false"
        podMonitorSelector:
          matchLabels:
            prometheus-operator.emnt.dev/prevent-scraping: "false"
        probeSelector:
          matchLabels:
            prometheus-operator.emnt.dev/prevent-scraping: "false"
        # Instead of matching on "release: prometheus" lable just grab everything
        ruleSelectorNilUsesHelmValues: false
        enableRemoteWriteReceiver: true
        resources:
          requests:
            cpu: 200m
            memory: 3Gi
          limits:
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: freenas-api-iscsi-csi
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 75Gi
      ingress:
        enabled: false # Using traefik IngressRoute
    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        alertmanagerConfiguration:
          name: alertmanager-global-config
