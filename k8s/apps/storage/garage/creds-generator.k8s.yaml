# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/generators.external-secrets.io/password_v1alpha1.json
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: hex-password
  namespace: garage
spec:
  length: 32
  allowRepeat: false
  noUpper: false
  encoding: hex
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rpc-secret
  namespace: garage
spec:
  refreshPolicy: OnChange
  target:
    name: rpc-secret
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: hex-password
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: admin-token
  namespace: garage
spec:
  refreshPolicy: OnChange
  target:
    name: admin-token
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: hex-password
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane-creds
  namespace: garage
spec:
  secretStoreRef:
    kind: SecretStore
    name: garage-secrets
  target:
    name: crossplane-creds
    template:
      engineVersion: v2
      data:
        credentials: |
          {
            "endpoint": "http://garage.garage.svc.cluster.local:3903",
            "token": "{{ .password }}"
          }
  dataFrom:
    - extract:
        key: admin-token
