# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/traefik.io/ingressroute_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: garage
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
  annotations:
    kubernetes.io/ingress.class: ingress-internal-traefik
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`garage.${CLUSTER_DOMAIN}`)
      services:
        - name: garage
          namespace: garage
          port: s3-api
    - kind: Rule
      match: Host(`*.garage.${CLUSTER_DOMAIN}`)
      services:
        - name: garage
          namespace: garage
          port: s3-api
    - kind: Rule
      match: Host(`*.www.${CLUSTER_DOMAIN}`)
      services:
        - name: garage
          namespace: garage
          port: web-api
    - kind: Rule
      match: Host(`www.${CLUSTER_DOMAIN}`)
      services:
        - name: garage
          namespace: garage
          port: web-api
