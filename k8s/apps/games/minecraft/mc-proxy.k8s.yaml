# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-proxy
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: minecraft
  chart:
    spec:
      chart: minecraft-proxy
      version: 3.9.0
      sourceRef:
        kind: HelmRepository
        name: itzg-minecraft
        namespace: flux-system
      interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    image:
      repository: docker.io/itzg/mc-proxy
      tag: 2025.10.0
    serviceAccountName: velocity-account
    extraVolumes:
      - volumeMounts:
          - name: secrets
            mountPath: /server/forwarding.secret
            subPath: forwarding.secret
            readOnly: true
        volumes:
          - name: secrets
            secret:
              secretName: mc-proxy-secrets
    minecraftProxy:
      type: VELOCITY
      velocityVersion: 3.4.0
      configFilePath: /server/velocity.toml
      config: |
        # vim:ft=toml
        # Config version. Do not change this
        config-version = "2.7"

        # What port should the proxy be bound to? By default, we'll bind to all addresses on port 25577.
        bind = "0.0.0.0:25577"

        # What should be the MOTD? This gets displayed when the player adds your server to
        # their server list. Only MiniMessage format is accepted.
        motd = "Server you're connecting to is scaled down. Connect and wait a minute, then retry"

        # What should we display for the maximum number of players? (Velocity does not support a cap
        # on the number of players online.)
        show-max-players = 10

        # Should we authenticate players with Mojang? By default, this is on.
        online-mode = true

        # Should the proxy enforce the new public key security standard? By default, this is on.
        force-key-authentication = true

        # If client's ISP/AS sent from this proxy is different from the one from Mojang's
        # authentication server, the player is kicked. This disallows some VPN and proxy
        # connections but is a weak form of protection.
        prevent-client-proxy-connections = false

        # Should we forward IP addresses and other data to backend servers?
        # Available options:
        # - "none":        No forwarding will be done. All players will appear to be connecting
        #                  from the proxy and will have offline-mode UUIDs.
        # - "legacy":      Forward player IPs and UUIDs in a BungeeCord-compatible format. Use this
        #                  if you run servers using Minecraft 1.12 or lower.
        # - "bungeeguard": Forward player IPs and UUIDs in a format supported by the BungeeGuard
        #                  plugin. Use this if you run servers using Minecraft 1.12 or lower, and are
        #                  unable to implement network level firewalling (on a shared host).
        # - "modern":      Forward player IPs and UUIDs as part of the login process using
        #                  Velocity's native forwarding. Only applicable for Minecraft 1.13 or higher.
        player-info-forwarding-mode = "modern"

        # If you are using modern or BungeeGuard IP forwarding, configure a file that contains a unique secret here.
        # The file is expected to be UTF-8 encoded and not empty.
        forwarding-secret-file = "forwarding.secret"

        # Announce whether or not your server supports Forge. If you run a modded server, we
        # suggest turning this on.
        #
        # If your network runs one modpack consistently, consider using ping-passthrough = "mods"
        # instead for a nicer display in the server list.
        announce-forge = true

        # If enabled (default is false) and the proxy is in online mode, Velocity will kick
        # any existing player who is online if a duplicate connection attempt is made.
        kick-existing-players = false

        # Should Velocity pass server list ping requests to a backend server?
        # Available options:
        # - "disabled":    No pass-through will be done. The velocity.toml and server-icon.png
        #                  will determine the initial server list ping response.
        # - "mods":        Passes only the mod list from your backend server into the response.
        #                  The first server in your try list (or forced host) with a mod list will be
        #                  used. If no backend servers can be contacted, Velocity won't display any
        #                  mod information.
        # - "description": Uses the description and mod list from the backend server. The first
        #                  server in the try (or forced host) list that responds is used for the
        #                  description and mod list.
        # - "all":         Uses the backend server's response as the proxy response. The Velocity
        #                  configuration is used if no servers could be contacted.
        ping-passthrough = "all"

        # If not enabled (default is true) player IP addresses will be replaced by <ip address withheld> in logs
        enable-player-address-logging = true

        [servers]
        "aeronautics-mc" = "10.111.111.10:25565"  # Drop when https://github.com/AzisabaNetwork/Kuvel/pull/71 merged

        try = ["aeronautics-mc"]

        [forced-hosts]
        "aeronautics-mc.${CLUSTER_DOMAIN}" = ["aeronautics-mc"]

        [advanced]
        # How large a Minecraft packet has to be before we compress it. Setting this to zero will
        # compress all packets, and setting it to -1 will disable compression entirely.
        compression-threshold = 256

        # How much compression should be done (from 0-9). The default is -1, which uses the
        # default level of 6.
        compression-level = -1

        # How fast (in milliseconds) are clients allowed to connect after the last connection? By
        # default, this is three seconds. Disable this by setting this to 0.
        login-ratelimit = 3000

        # Specify a custom timeout for connection timeouts here. The default is five seconds.
        connection-timeout = 5000

        # Specify a read timeout for connections here. The default is 30 seconds.
        read-timeout = 30000

        # Enables compatibility with HAProxy's PROXY protocol. If you don't know what this is for, then
        # don't enable it.
        haproxy-protocol = false

        # Enables TCP fast open support on the proxy. Requires the proxy to run on Linux.
        tcp-fast-open = false

        # Enables BungeeCord plugin messaging channel support on Velocity.
        bungee-plugin-message-channel = true

        # Shows ping requests to the proxy from clients.
        show-ping-requests = false

        # By default, Velocity will attempt to gracefully handle situations where the user unexpectedly
        # loses connection to the server without an explicit disconnect message by attempting to fall the
        # user back, except in the case of read timeouts. BungeeCord will disconnect the user instead. You
        # can disable this setting to use the BungeeCord behavior.
        failover-on-unexpected-server-disconnect = true

        # Declares the proxy commands to 1.13+ clients.
        announce-proxy-commands = true

        # Enables the logging of commands
        log-command-executions = false

        # Enables logging of player connections when connecting to the proxy, switching servers
        # and disconnecting from the proxy.
        log-player-connections = true

        # Allows players transferred from other hosts via the
        # Transfer packet (Minecraft 1.20.5) to be received.
        accepts-transfers = false

        [query]
        # Whether to enable responding to GameSpy 4 query responses or not.
        enabled = false

        # If query is enabled, on what port should the query protocol listen on?
        port = 25577

        # This is the map name that is reported to the query services.
        map = "Velocity"

        # Whether plugins should be shown in query response by default or not
        show-plugins = false
    extraEnv:
      MODRINTH_PROJECTS: |
        simple-voice-chat:alpha
      MINECRAFT_VERSION: 1.21.1
      KUVEL_REDIS_CONNECTION_HOSTNAME: kuvel-valkey.minecraft.svc.cluster.local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuvel-valkey
  namespace: minecraft
  labels:
    app.kubernetes.io/name: kuvel-valkey
    app.kubernetes.io/instance: kuvel-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuvel-valkey
      app.kubernetes.io/instance: kuvel-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuvel-valkey
        app.kubernetes.io/instance: kuvel-valkey
    spec:
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:9.0.4-alpine3.23
---
apiVersion: v1
kind: Service
metadata:
  name: kuvel-valkey
  namespace: minecraft
  labels:
    app.kubernetes.io/name: kuvel-valkey
    app.kubernetes.io/instance: kuvel-valkey
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kuvel-valkey
    app.kubernetes.io/instance: kuvel-valkey
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/generators.external-secrets.io/password_v1alpha1.json
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: mc-proxy-forwarding-secret
  namespace: minecraft
spec:
  length: 32
  allowRepeat: false
  noUpper: false
  encoding: hex
  secretKeys:
    - forwardingSecret
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mc-proxy-secrets
  namespace: minecraft
spec:
  refreshPolicy: OnChange
  target:
    name: mc-proxy-secrets
    template:
      engineVersion: v2
      data:
        forwarding.secret: "{{ .forwardingSecret }}"
        proxy-compatible-forge.toml: |
          # vim: ft=toml
          # Config version, DO NOT CHANGE THIS
          version = 2.0

          # Player Info Forwarding Settings
          [forwarding]
          # Enable or disable player info forwarding. Changing this setting requires a server restart.
          enabled = true
          # The type of forwarding to use
          # Allowed Values: MODERN
          mode = "MODERN"
          # The forwarding secret shared with the proxy
          secret = "{{ .forwardingSecret }}"
          # A list of approved proxy hostnames or IP addresses. If the connecting proxy's hostname or IP isn't in this list, the player will be disconnected. Leave empty to allow all.
          approvedProxyHosts = []

          # CrossStitch Settings - For Wrapping Modded Command Arguments
          [crossStitch]
          # Enable or disable CrossStitch support. Changing this setting requires a server restart.
          enabled = true
          # Add any incompatible modded or vanilla command argument types here
          forceWrappedArguments = []
          # Force wrap vanilla command argument types. Useful for when the above setting gets a bit excessive.
          forceWrapVanillaArguments = false

          # Debug Settings
          [debug]
          # Enable or disable debug mode.
          enabled = false
          # List of mixins to disable. Use the Mixin's name and prefix it with it's partial or full package name.
          disabledMixins = []

          # Advanced Settings
          [advanced]
          # Overrides the modern forwarding version decided by PCF. Change it to "MODERN_DEFAULT" if you encounter chat-signing issues. Changing this setting requires a server restart.
          # Allowed Values: NO_OVERRIDE, MODERN_DEFAULT, MODERN_FORWARDING_WITH_KEY, MODERN_FORWARDING_WITH_KEY_V2, MODERN_LAZY_SESSION
          modernForwardingVersion = "MODERN_DEFAULT"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: mc-proxy-forwarding-secret
