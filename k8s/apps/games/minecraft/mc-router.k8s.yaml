# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-router
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: minecraft
  chart:
    spec:
      chart: mc-router
      version: 1.4.1
      sourceRef:
        kind: HelmRepository
        name: itzg-minecraft
        namespace: flux-system
      interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    image:
      # renovate: datasource=github-releases depName=itzg/mc-router
      tag: 1.40.3
    services:
      minecraft:
        type: ClusterIP
    minecraftRouter:
      autoScale:
        up:
          enabled: true
        down:
          enabled: true
          after: "15m"
      useProxyProtocol: true
    extraEnv:
      RECEIVE_PROXY_PROTOCOL: "true"
