# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kubelet-csr-approver
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/postfinance/kubelet-csr-approver.git
  sparseCheckout:
    - deploy
  ref:
    tag: v1.2.14
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubelet-csr-approver-upstream
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy
  targetNamespace: kubelet-csr-approver
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubelet-csr-approver
  patches:
    - target:
        kind: Deployment
        name: kubelet-csr-approver
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: not-used
        spec:
          template:
            spec:
              containers:
                - name: kubelet-csr-approver
                  image: ghcr.io/postfinance/kubelet-csr-approver:v1.2.14
                  env:
                    - name: PROVIDER_REGEX
                      value: ^talos-(worker|controlplane)-\d+$
                    - name: PROVIDER_IP_PREFIXES
                      value: "${LOCAL_CIDR}"
