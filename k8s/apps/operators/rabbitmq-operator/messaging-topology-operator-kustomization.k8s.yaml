# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: messaging-topology-operator
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/rabbitmq/messaging-topology-operator.git
  sparseCheckout:
    - config
  ref:
    # NOTE: Update Kustomization newTag as well
    tag: v1.19.1
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messaging-topology-operator-upstream
  namespace: flux-system
spec:
  interval: 10m
  path: ./config/installation
  targetNamespace: rabbitmq-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: messaging-topology-operator
  images:
    - name: localhost/messaging-topology-operator
      newName: ghcr.io/rabbitmq/messaging-topology-operator
      # NOTE: Update GitRepository tag as well
      newTag: 1.19.0
  patches:
    - patch: |
        $patch: delete
        apiVersion: v1
        kind: Namespace
        metadata:
          name: rabbitmq-system
    - patch: |
        - op: replace
          path: /subjects/0/namespace
          value: rabbitmq-operator
      target:
        kind: "(RoleBinding|ClusterRoleBinding)"
    - patch: |
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: messaging-topology-serving-cert
          namespace: rabbitmq-system
        spec:
          dnsNames:
            - messaging-topology-webhook-service.rabbitmq-operator.svc
            - messaging-topology-webhook-service.rabbitmq-operator.svc.cluster.local
    - patch: |
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: messaging-topology-metrics-certs
          namespace: rabbitmq-system
        spec:
          dnsNames:
            - messaging-topology-controller-metrics-service.rabbitmq-operator.svc
            - messaging-topology-controller-metrics-service.rabbitmq-operator.svc.cluster.local
    - patch: |
        apiVersion: admissionregistration.k8s.io/v1
        kind: ValidatingWebhookConfiguration
        metadata:
          name: validating-webhook-configuration
          annotations:
            cert-manager.io/inject-ca-from: rabbitmq-operator/messaging-topology-serving-cert
