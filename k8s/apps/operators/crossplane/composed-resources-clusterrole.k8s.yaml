apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crds:aggregate-to-crossplane
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  - apiGroups:
      - generators.external-secrets.io
    resources:
      - mfas
      - passwords
      - sshkeys
      - uuids
      - webhooks
    verbs:
      - "*"
  - apiGroups:
      - external-secrets.io
    resources:
      - externalsecrets
      - externalsecrets/status
      - externalsecrets/finalizers
      - secretstores
      - secretstores/status
      - secretstores/finalizers
      - pushsecrets
      - pushsecrets/status
      - pushsecrets/finalizers
    verbs:
      - "*"
  - apiGroups:
      - chisel-operator.io
    resources:
      - exitnodes
    verbs:
      - "*"
  - apiGroups:
      - argoproj.io
    resources:
      - cronworkflows
      - workflows
      - workflowtemplates
    verbs:
      - "*"
