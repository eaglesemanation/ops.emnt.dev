apiVersion: apps/v1
kind: Deployment
metadata:
  name: attic
  namespace: attic
  labels:
    app.kubernetes.io/name: attic
    app.kubernetes.io/instance: attic
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: attic
      app.kubernetes.io/instance: attic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: attic
        app.kubernetes.io/instance: attic
    spec:
      containers:
        - name: attic
          image: forgejo.emnt.dev/public/attic-server:latest
          args: [-f, /etc/attic/config.toml]
          envFrom:
            - secretRef:
                name: jwt-secrets
          env:
            - name: RUST_LOG
              value: attic_server=debug
            - name: ATTIC_SERVER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: attic-pg-app
                  key: uri
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-creds
                  key: access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-creds
                  key: secret_access_key
          volumeMounts:
            - name: config
              mountPath: /etc/attic
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: attic-config
