apiVersion: key.garage.m.crossplane.io/v1alpha1
kind: Key
metadata:
  name: attic
  namespace: attic
spec:
  providerConfigRef:
    kind: ClusterProviderConfig
    name: garage
  forProvider:
    name: attic
  writeConnectionSecretToRef:
    name: garage-creds
---
apiVersion: bucket.garage.m.crossplane.io/v1alpha1
kind: Bucket
metadata:
  name: attic
  namespace: attic
spec:
  providerConfigRef:
    kind: ClusterProviderConfig
    name: garage
  forProvider:
    globalAlias: attic
---
apiVersion: bucket.garage.m.crossplane.io/v1alpha1
kind: Permission
metadata:
  name: attic
  namespace: attic
spec:
  providerConfigRef:
    kind: ClusterProviderConfig
    name: garage
  forProvider:
    accessKeyIdRef:
      name: attic
    bucketIdRef:
      name: attic
    read: true
    write: true
