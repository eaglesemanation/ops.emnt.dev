# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/generators.external-secrets.io/sshkey_v1alpha1.json
apiVersion: generators.external-secrets.io/v1alpha1
kind: SSHKey
metadata:
  name: nixos-deploy-ssh-key
  namespace: argo-workflows
spec:
  keyType: "ed25519"
  comment: "argo-workflows@emnt.dev"
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nixos-deploy-ssh-key
  namespace: argo-workflows
spec:
  refreshInterval: "30m0s"
  refreshPolicy: OnChange
  target:
    name: nixos-deploy-ssh-key
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: SSHKey
          name: nixos-deploy-ssh-key
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/argoproj.io/clusterworkflowtemplate_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: nixos-deploy
  namespace: argo-workflows
spec:
  entrypoint: dag
  arguments:
    parameters:
      - name: targetHost
        value: 127.0.0.1
      - name: sshUser
        value: "root"
      - name: sshSecretRef
        description: Name of a secret that contains "privateKey" and "publicKey" key for ssh. Needs to be ed25519 for SOPS.
        value: "nixos-deploy-ssh-key"
      - name: replaceHostKey
        description: If host key was already present in known hosts - replace it with new one
        value: "false"
      - name: flakeRepo
        value: "https://github.com/eaglesemanation/ops.emnt.dev.git"
      - name: flakeAttr
        value: "placeholderVm"
      - name: sopsSecretRef
        description: Name of a k8s secret that contains "secrets.json". It will be converted into sops file for sops-nix use
        value: "placeholder-vm-secrets"
      - name: sopsSecretTargetPath
        description: Path under flakeRepo where sops encrypted secrets should be written
        value: nix/secrets.sops.json

  templates:
    - name: dag
      dag:
        tasks:
          - name: ensure-known-hosts
            template: ensure-known-hosts
          - name: encrypt-secrets
            template: encrypt-secrets
            dependencies:
              - ensure-known-hosts
          - name: detect-mode
            template: detect-mode
            dependencies:
              - ensure-known-hosts
          - name: nixos-anywhere
            template: nixos-anywhere
            dependencies:
              - encrypt-secrets
              - detect-mode
            when: '"{{tasks.detect-mode.outputs.parameters.mode}}" == "bootstrap"'
            arguments:
              artifacts:
                - name: secretsSops
                  from: "{{tasks.encrypt-secrets.outputs.artifacts.secretsSops}}"
          - name: deploy-rs
            template: deploy-rs
            dependencies:
              - encrypt-secrets
              - detect-mode
            when: '"{{tasks.detect-mode.outputs.parameters.mode}}" == "deploy"'
            arguments:
              artifacts:
                - name: secretsSops
                  from: "{{tasks.encrypt-secrets.outputs.artifacts.secretsSops}}"

    - name: ensure-known-hosts
      script:
        image: docker.io/library/alpine:3.23.4
        securityContext:
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          runAsUser: 0
        command: [sh]
        source: |
          set -eux
          SSH_HOST="{{workflow.parameters.targetHost}}"
          REPLACE_KEY="{{workflow.parameters.replaceHostKey}}"
          SECRET_NAME="nixos-known-hosts"

          tmpdir=$(mktemp -d)
          KNOWN_HOSTS="$tmpdir/known_hosts"

          apk add openssh kubectl

          if kubectl get secret "$SECRET_NAME" >/dev/null 2>&1; then
            kubectl get secret "$SECRET_NAME" -o jsonpath='{.data.known_hosts}' | base64 -d > "$KNOWN_HOSTS"
          else
            touch "$KNOWN_HOSTS"
          fi

          if [ "$REPLACE_KEY" = "true" ]; then
            ssh-keygen -R "$SSH_HOST" -f "$KNOWN_HOSTS" || true
          fi
          if ! grep -q "$SSH_HOST" "$KNOWN_HOSTS"; then
            ssh-keyscan "$SSH_HOST" | grep -v '^#' >> "$KNOWN_HOSTS"
          fi

          kubectl create secret generic "$SECRET_NAME" \
            --from-file=known_hosts="$KNOWN_HOSTS" \
            --dry-run=client -o yaml | kubectl apply -f -

    - name: encrypt-secrets
      outputs:
        artifacts:
          - name: secretsSops
            path: /tmp/secrets.sops.json
      script:
        image: docker.io/library/alpine:3.23.4
        securityContext:
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          runAsUser: 0
        command: [sh]
        source: |
          set -eux
          SSH_HOST="{{workflow.parameters.targetHost}}"

          apk add go sops
          go install github.com/Mic92/ssh-to-age/cmd/ssh-to-age@latest

          SSH_PUBKEY="$(cat /root/.ssh/known_hosts | grep "$SSH_HOST" | grep 'ssh-ed25519')"
          if [[ -z "$SSH_PUBKEY" ]]; then
            echo "ERROR: No ssh-ed25519 entry found for host '$SSH_HOST' in known_hosts" >&2
            exit 1
          fi
          AGE_PUBKEY="$(echo "$SSH_PUBKEY"| /root/go/bin/ssh-to-age)"

          sops --encrypt --age "$AGE_PUBKEY" --output "/tmp/secrets.sops.json" /tmp/secrets.json
        volumeMounts:
          - name: known-hosts
            mountPath: /root/.ssh/known_hosts
            subPath: known_hosts
          - name: secrets-source
            mountPath: /tmp/secrets.json
            subPath: secrets.json
      volumes:
        - name: known-hosts
          secret:
            secretName: "nixos-known-hosts"
            defaultMode: 384 # 0600
        - name: secrets-source
          secret:
            secretName: "{{workflow.parameters.sopsSecretRef}}"
            defaultMode: 384 # 0600

    - name: detect-mode
      script:
        image: docker.io/library/alpine:3.23.4
        securityContext:
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          runAsUser: 0
        command: [sh]
        source: |
          set -eux
          SSH_HOST="{{workflow.parameters.targetHost}}"
          SSH_USER="{{workflow.parameters.sshUser}}"
          SSH_OPTS="-o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=yes"

          apk add openssh
          SSH_OUTPUT=$(
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" /bin/sh <<EOF
            test -f /etc/NIXOS && echo "true" || echo "false"
            findmnt -n -o FSTYPE /
          EOF
          )
          IS_NIXOS=$(echo "$SSH_OUTPUT" | head -1)
          ROOT_FS=$(echo "$SSH_OUTPUT" | tail -1)

          if [ "$IS_NIXOS" = "false" ]; then
            echo "bootstrap" > /tmp/mode
          else
            case "$ROOT_FS" in
              tmpfs|overlay|squashfs)
                echo "bootstrap" > /tmp/mode
                ;;
              *)
                echo "deploy" > /tmp/mode
                ;;
            esac
          fi
        volumeMounts: &ssh-volume-mounts
          - name: known-hosts
            mountPath: /root/.ssh/known_hosts
            subPath: known_hosts
          - name: ssh-key
            mountPath: /root/.ssh/id_ed25519
            subPath: privateKey
          - name: ssh-key
            mountPath: /root/.ssh/id_ed25519.pub
            subPath: publicKey
      outputs:
        parameters:
          - name: mode
            valueFrom:
              path: /tmp/mode
      volumes: &ssh-volumes
        - name: known-hosts
          secret:
            secretName: "nixos-known-hosts"
            defaultMode: 384 # 0600
        - name: ssh-key
          secret:
            secretName: "{{workflow.parameters.sshSecretRef}}"
            defaultMode: 384 # 0600

    - name: nixos-anywhere
      inputs:
        artifacts:
          - name: secretsSops
            path: /tmp/secrets.sops.json
      script:
        image: docker.io/nixos/nix:2.34.6
        command: [sh]
        source: |
          set -eux
          SSH_HOST="{{workflow.parameters.targetHost}}"
          SSH_USER="{{workflow.parameters.sshUser}}"

          git clone "{{workflow.parameters.flakeRepo}}" /tmp/flake
          cp /tmp/secrets.sops.json '/tmp/flake/{{workflow.parameters.sopsSecretTargetPath}}'

          nix run github:nix-community/nixos-anywhere -- \
            --flake '/tmp/flake#{{workflow.parameters.flakeAttr}}' \
            -i /root/.ssh/id_ed25519 \
            --copy-host-keys \
            --target-host "$SSH_USER@$SSH_HOST"
        env:
          - name: NIX_CONFIG
            value: &nix-config |
              sandbox = false
              trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
              experimental-features = nix-command flakes
        volumeMounts: *ssh-volume-mounts
      volumes: *ssh-volumes

    - name: deploy-rs
      inputs:
        artifacts:
          - name: secretsSops
            path: /tmp/secrets.sops.json
      script:
        image: docker.io/nixos/nix:2.34.6
        command: [sh]
        source: |
          set -eux
          SSH_HOST="{{workflow.parameters.targetHost}}"
          SSH_USER="{{workflow.parameters.sshUser}}"

          git clone "{{workflow.parameters.flakeRepo}}" /tmp/flake
          cp /tmp/secrets.sops.json '/tmp/flake/{{workflow.parameters.sopsSecretTargetPath}}'

          nix run github:serokell/deploy-rs -- \
            '/tmp/flake#{{workflow.parameters.flakeAttr}}' \
            --ssh-user "$SSH_USER" \
            --hostname "$SSH_HOST"
        env:
          - name: NIX_CONFIG
            value: *nix-config
        volumeMounts: *ssh-volume-mounts
      volumes: *ssh-volumes
