apiVersion: v1
kind: Service
metadata:
  name: blocky
  namespace: blocky
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/instance: blocky
spec:
  type: LoadBalancer
  loadBalancerIP: "${SVC_DNS_ADDR}"
  selector:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/instance: blocky
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: unbound
  namespace: blocky
  labels:
    app.kubernetes.io/name: unbound
    app.kubernetes.io/instance: unbound
spec:
  type: LoadBalancer
  loadBalancerIP: "${SVC_UNBOUND_ADDR}"
  selector:
    app.kubernetes.io/name: unbound
    app.kubernetes.io/instance: unbound
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
