# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/apiextensions.crossplane.io/compositeresourcedefinition_v2.json
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: edgegateways.crossplane.emnt.dev
spec:
  scope: Namespaced
  group: crossplane.emnt.dev
  names:
    kind: EdgeGateway
    plural: edgegateways
  versions:
    - name: v1alpha1
      referenceable: true
      served: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["cloud"]
              properties:
                cloud:
                  type: string
                  enum:
                    - nocloud
                    - digitalocean
                digitaloceanConfig:
                  type: object
                  required: ["region"]
                  properties:
                    image:
                      type: string
                      default: ubuntu-24-04-x64
                    region:
                      type: string
                      enum: ["nyc1", "nyc2", "nyc3", "sfo1", "sfo2", "sfo3", "ams2", "ams3", "sgp1", "lon1", "fra1", "tor1", "blr1", "syd1", "atl1", "ric1"]
                    size:
                      type: string
                      default: s-1vcpu-1gb
                    importReservedIPv4:
                      type: string
                      description: Use already preexisting Reserved IPv4 address
