# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/apiextensions.crossplane.io/composition_v1.json
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: edgegateways
spec:
  compositeTypeRef:
    apiVersion: crossplane.emnt.dev/v1alpha1
    kind: EdgeGateway
  mode: Pipeline
  pipeline:
    - step: ssh-key
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # vim:ft=yaml
            {{ $compositeName := .observed.composite.resource.metadata.name }}
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: {{ $compositeName }}-ssh-key
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "ssh-key-external-secret" }}
            spec:
              refreshPolicy: OnChange
              target:
                name: {{ $compositeName }}-ssh-key
              dataFrom:
                - sourceRef:
                    generatorRef:
                      apiVersion: generators.external-secrets.io/v1alpha1
                      kind: SSHKey
                      name: ssh-key-generator
    - step: cloud
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # vim:ft=yaml
            {{- $composite := .observed.composite.resource }}
            {{- $spec := $composite.spec }}
            {{- if (eq $spec.cloud "digitalocean") }}
            {{- $compositeName := $composite.metadata.name }}
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              sshKey:
                apiVersion: v1
                kind: Secret
                matchName: {{ $compositeName }}-ssh-key
                namespace: edge-gateways
            ---
            {{- if and
                (hasKey .extraResources "sshKey")
                (hasKey .extraResources.sshKey "items")
                (eq (len .extraResources.sshKey.items) 1)
            }}
            {{ $sshKeyRes := index .extraResources.sshKey.items 0 }}
            apiVersion: digitalocean.m.crossplane.io/v1alpha1
            kind: Key
            metadata:
              name: {{ $compositeName }}-ssh-key
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "ssh-key-digitalocean" }}
            spec:
              forProvider:
                name: {{ $compositeName }}-ssh-key
                publicKey: {{ $sshKeyRes.resource.data.publicKey | b64dec }}
              providerConfigRef:
                kind: ProviderConfig
                name: digitalocean
            ---
            apiVersion: digitalocean.m.crossplane.io/v1alpha1
            kind: Droplet
            metadata:
              name: {{ $compositeName }}-vm
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "droplet" }}
            spec:
              forProvider:
                name: ${CLUSTER_DOMAIN}
                region: {{ $spec.digitaloceanConfig.region }}
                size: {{ $spec.digitaloceanConfig.size }}
                image: {{ $spec.digitaloceanConfig.image }}
                sshKeysRefs:
                  - name: {{ $compositeName }}-ssh-key
              providerConfigRef:
                kind: ProviderConfig
                name: digitalocean
            ---
            {{- if and
                (hasKey .observed.resources "droplet")
                (hasKey .observed.resources.droplet.resource "status")
                (.observed.resources.droplet.resource.status.atProvider.ipv4Address)
            }}
            apiVersion: crossplane.emnt.dev/v1alpha1
            kind: EdgeGateway
            status:
              publicIP: {{ .observed.resources.droplet.resource.status.atProvider.ipv4Address }}
            ---
            {{- end }}
            apiVersion: digitalocean.m.crossplane.io/v1alpha1
            kind: IP
            metadata:
              name: {{ $compositeName }}-ipv4
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "ipv4" }}
                {{- if hasKey $spec.digitaloceanConfig "importReservedIPv4" }}
                crossplane.io/external-name: {{ $spec.digitaloceanConfig.importReservedIPv4 }}
                {{- end }}
            spec:
              forProvider:
                region: {{ $spec.digitaloceanConfig.region }}
              {{- if hasKey $spec.digitaloceanConfig "importReservedIPv4" }}
              managementPolicies: ["Observe"]
              {{- end }}
              providerConfigRef:
                kind: ProviderConfig
                name: digitalocean
            ---
            apiVersion: digitalocean.m.crossplane.io/v1alpha1
            kind: IPAssignment
            metadata:
              name: {{ $compositeName }}-ipv4-assignment
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "ipv4-assignment" }}
            spec:
              forProvider:
                dropletIdRef:
                  name: {{ $compositeName }}-vm
                ipAddressRef:
                  name: {{ $compositeName }}-ipv4
              providerConfigRef:
                kind: ProviderConfig
                name: digitalocean
            ---
            apiVersion: protection.crossplane.io/v1beta1
            kind: Usage
            metadata:
              name: {{ $compositeName }}-assign-usage-ipv4
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "assign-usage-ipv4" }}
            spec:
              of:
                apiVersion: digitalocean.m.crossplane.io/v1alpha1
                kind: IP
                resourceRef:
                  name: {{ $compositeName }}-ipv4
              by:
                apiVersion: digitalocean.m.crossplane.io/v1alpha1
                kind: IPAssignment
                resourceRef:
                  name: {{ $compositeName }}-ipv4-assignment
            ---
            apiVersion: protection.crossplane.io/v1beta1
            kind: Usage
            metadata:
              name: {{ $compositeName }}-assign-usage-droplet
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "assign-usage-droplet" }}
            spec:
              of:
                apiVersion: digitalocean.m.crossplane.io/v1alpha1
                kind: Droplet
                resourceRef:
                  name: {{ $compositeName }}-vm
              by:
                apiVersion: digitalocean.m.crossplane.io/v1alpha1
                kind: IPAssignment
                resourceRef:
                  name: {{ $compositeName }}-ipv4-assignment
            {{- end }}
            ---
            {{- else if eq $spec.cloud "nocloud"}}
            apiVersion: crossplane.emnt.dev/v1alpha1
            kind: EdgeGateway
            status:
              publicIP: {{ $spec.nocloudConfig.ip }}
            {{- end }}
    - step: chisel
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # vim:ft=yaml
            {{- $composite := .observed.composite.resource }}
            {{- $compositeName := $composite.metadata.name }}
            {{- if $composite.status.publicIP }}
            apiVersion: chisel-operator.io/v1
            kind: ExitNode
            metadata:
              name: {{ $compositeName }}
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "chisel-exit-node" }}
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              host: {{ $composite.status.publicIP }}
              port: 9090
              auth: {{ $compositeName }}-chisel-auth
            ---
            {{- end }}
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: {{ $compositeName }}-chisel-auth
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "chisel-auth" }}
            spec:
              refreshPolicy: OnChange
              target:
                name: {{ $compositeName }}-chisel-auth
                template:
                  engineVersion: v2
                  data:
                    auth: chisel:{{`{{ .password }}`}}
              dataFrom:
                - sourceRef:
                    generatorRef:
                      apiVersion: generators.external-secrets.io/v1alpha1
                      kind: Password
                      name: password-generator
    - step: nixos-workflow
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # vim:ft=yaml
            {{- $composite := .observed.composite.resource }}
            {{- $spec := $composite.spec }}
            {{- $compositeName := $composite.metadata.name }}
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: {{ $compositeName }}-nixos-secrets
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "nixos-secrets" }}
            spec:
              secretStoreRef:
                kind: SecretStore
                name: edge-gateways-secrets
              target:
                name: {{ $compositeName }}-nixos-secrets
                template:
                  engineVersion: v2
                  data:
                    secrets.yaml: |
                      ssh:
                        root:
                          authorizedKeys: |
                            {{`{{.sshPublicKey}}`}}
                      chisel:
                        authfile.json: |
                          {
                            "{{`{{.chiselAuth}}`}}": [""]
                          }
                      crowdsecBouncer:
                        apikey: "TODO - put actual API key"
              data:
                - secretKey: sshPublicKey
                  remoteRef:
                    key: {{ $compositeName }}-ssh-key
                    property: publicKey
                - secretKey: chiselAuth
                  remoteRef:
                    key: {{ $compositeName }}-chisel-auth
                    property: auth
            ---
            {{- $flakeAttr := "edgeGatewayGeneric" }}
            {{- if eq $spec.cloud "digitalocean" }}
              {{- $flakeAttr = "edgeGatewayDigitalocean" }}
            {{- end }}
            {{- if $composite.status.publicIP }}
            apiVersion: argoproj.io/v1alpha1
            kind: CronWorkflow
            metadata:
              name: {{ $compositeName }}-nixos
              namespace: edge-gateways
              annotations:
                {{ setResourceNameAnnotation "nixos-cron-workflow" }}
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              concurrencyPolicy: Forbid
              schedules:
                - "0 10 * * 1"
              workflowSpec:
                entrypoint: dag
                serviceAccountName: argo-workflows
                arguments:
                  parameters:
                    - name: targetHost
                      value: {{ $composite.status.publicIP }}
                    - name: sshSecretRef
                      value: {{ $compositeName }}-ssh-key
                    - name: flakeAttr
                      value: {{ $flakeAttr }}
                    - name: sopsSecretRef
                      value: {{ $compositeName }}-nixos-secrets
                workflowTemplateRef:
                  clusterScope: true
                  name: nixos-deploy
            {{- end }}
    - step: detect-readiness
      functionRef:
        name: function-auto-ready
